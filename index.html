<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recursos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --surface2:  #1f1f1f;
      --border:    #2a2a2a;
      --text:      #e8e8e8;
      --muted:     #888;
      --accent:    #FDEABF;
      --accent-dim:#c9b78a;
      --radius:    12px;
      --gap:       20px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,13,.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 14px clamp(20px, 5vw, 60px);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-left  { flex: 1; display: flex; align-items: center; }
    .header-center { flex: 1; display: flex; align-items: center; justify-content: center; }
    .header-right { flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 10px; }

    .logo img { height: 53px; width: auto; display: block; }

    .search-wrap {
      width: 100%;
      max-width: 360px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 9px 12px 9px 38px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }

    /* ── HEADER BUTTONS ── */
    .header-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: .8rem;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      transition: all .18s;
    }
    .btn-suggest {
      background: var(--accent);
      color: #111;
    }
    .btn-suggest:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .btn-portfolio {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-portfolio:hover { color: var(--text); border-color: #555; transform: translateY(-1px); }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      header {
        flex-wrap: wrap;
        padding: 12px 16px;
        gap: 10px;
      }

      /* Linha 1: logo + search */
      .header-left  { flex: 0 0 auto; }
      .header-center { flex: 1; min-width: 0; justify-content: flex-end; }
      .search-wrap  { max-width: 100%; width: 100%; }

      /* Linha 2: botões full width */
      .header-right {
        flex: 0 0 100%;
        gap: 8px;
      }
      .header-btn {
        flex: 1;
        justify-content: center;
      }
      .btn-label { display: inline; }
    }

    /* ── STATS BAR ── */
    .stats {
      padding: 14px clamp(20px, 5vw, 60px);
      font-size: .8rem;
      color: var(--muted);
    }
    #count { color: var(--text); font-weight: 600; }

    /* ── FILTER AREA ── */
    .filter-area {
      padding: 0 clamp(20px, 5vw, 60px) 20px;
    }

    .type-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      align-items: center;
    }

    .tag-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px dashed var(--border);
      background: transparent;
      color: var(--muted);
      transition: all .18s;
      user-select: none;
      letter-spacing: .3px;
      margin-left: auto;
    }
    .tag-toggle:hover { color: var(--text); border-color: #555; }
    .tag-toggle.open  { border-style: solid; border-color: var(--accent); color: var(--accent); }
    .tag-toggle .badge {
      background: var(--accent);
      color: #111;
      font-size: .65rem;
      font-weight: 800;
      border-radius: 999px;
      padding: 1px 6px;
      display: none;
    }
    .tag-toggle .badge.visible { display: inline; }

    .tag-scroll {
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .tag-scroll.open { display: flex; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all .18s;
      user-select: none;
      letter-spacing: .3px;
      text-transform: uppercase;
    }
    .pill.all   { background: var(--surface2); border-color: var(--border); color: var(--text); }
    .pill.video { background: #1a0a2e; border-color: #7c3aed40; color: #a78bfa; }
    .pill.link  { background: #0a1f2e; border-color: #0ea5e940; color: #38bdf8; }
    .pill.image { background: #1a1a0a; border-color: #ca8a0440; color: #fbbf24; }
    .pill.download { background: #0a2010; border-color: #16a34a40; color: #4ade80; }

    .pill.active.all      { background: var(--surface2); border-color: var(--text); color: var(--text); }
    .pill.active.video    { background: #7c3aed; border-color: #7c3aed; color: #fff; }
    .pill.active.link     { background: #0ea5e9; border-color: #0ea5e9; color: #fff; }
    .pill.active.image    { background: #ca8a04; border-color: #ca8a04; color: #fff; }
    .pill.active.download { background: #16a34a; border-color: #16a34a; color: #fff; }

    .pill:hover { filter: brightness(1.2); }

    .tag {
      flex-shrink: 0;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: .76rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      user-select: none;
    }
    .tag:hover { color: var(--text); border-color: #555; }
    .tag.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 700;
    }

    /* ── GRID ── */
    main {
      padding: 0 clamp(20px, 5vw, 60px) 60px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: var(--gap);
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: #444;
      box-shadow: 0 12px 40px rgba(0,0,0,.5);
    }

    .card-thumb {
      aspect-ratio: 16/9;
      background: var(--surface2);
      position: relative;
      overflow: hidden;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0) brightness(0.8);
      transition: transform .3s, filter .35s;
    }
    .card:hover .card-thumb img { transform: scale(1.04); filter: saturate(1) brightness(1); }

    .thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      opacity: .35;
    }

    .play-badge {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.4);
      transition: background .2s;
    }
    .card:hover .play-badge { background: rgba(0,0,0,.2); }
    .play-badge svg { filter: drop-shadow(0 2px 8px rgba(0,0,0,.6)); }

    .type-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 3px 9px;
      border-radius: 6px;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    .type-badge.video    { background: #7c3aed; color: #fff; }
    .type-badge.link     { background: #0ea5e9; color: #fff; }
    .type-badge.image    { background: #ca8a04; color: #fff; }
    .type-badge.download { background: #16a34a; color: #fff; }

    .card-body {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .card-title {
      font-size: .92rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
    }

    .card-desc {
      font-size: .79rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: auto;
      padding-top: 4px;
    }
    .card-tag {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: .69rem;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .card-tag:hover { color: var(--accent); border-color: var(--accent-dim); }

    /* ── EMPTY STATE ── */
    #empty {
      display: none;
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    #empty .emoji { font-size: 3rem; margin-bottom: 16px; }
    #empty p { font-size: .95rem; }

    /* ── MODAL ── */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,.88);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #modal.open { display: flex; }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      overflow: hidden;
      overflow-y: auto;
      animation: pop .22s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes pop {
      from { transform: scale(.92); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .modal-wrap {
      position: relative;
      width: 90vw;
      max-width: 900px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }

    .modal-close {
      position: absolute;
      top: -42px;
      right: 0;
      z-index: 1100;
      background: rgba(20,20,20,.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text);
      transition: background .15s, transform .15s;
    }
    .modal-close:hover { background: rgba(255,255,255,.15); transform: scale(1.08); }

    #modal-iframe-wrap {
      aspect-ratio: 16/9;
      background: #000;
      width: 100%;
    }
    #modal-iframe-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    #modal-img-wrap { background: #000; text-align: center; max-height: 70vh; overflow: hidden; }
    #modal-img-wrap img { max-width: 100%; max-height: 70vh; object-fit: contain; display: block; margin: auto; }

    .modal-info {
      padding: 18px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .modal-title { font-size: 1.05rem; font-weight: 700; }
    .modal-desc  { font-size: .85rem; color: var(--muted); line-height: 1.6; }
    .modal-tags  { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .modal-tag {
      padding: 3px 10px;
      border-radius: 5px;
      font-size: .72rem;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .modal-tag:hover { color: var(--accent); border-color: var(--accent-dim); }
    .modal-action {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      text-decoration: none;
      margin-top: 6px;
      align-self: flex-start;
      transition: filter .15s;
    }
    .modal-action:hover { filter: brightness(1.1); }
    .modal-action.link     { background: #0ea5e9; color: #fff; }
    .modal-action.download { background: #16a34a; color: #fff; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <div class="logo"><img src="logo.png" alt="MAiA"></div>
  </div>
  <div class="header-center">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

<!-- STATS -->
<div class="stats">
  Mostrando <span id="count">0</span> recursos
</div>

<!-- FILTERS -->
<div class="filter-area">
  <div class="type-pills" id="type-pills">
    <div class="pill all active" data-type="all">Todos</div>
    <div class="pill video" data-type="video">▶ Vídeo</div>
    <div class="pill link" data-type="link">↗ Link</div>
    <div class="pill image" data-type="image">◉ Imagem</div>
    <div class="pill download" data-type="download">↓ Download</div>
    <button class="tag-toggle" id="tag-toggle">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>

  </div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-wrap">
    <button class="modal-close" id="modal-close">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
    <div class="modal-box" id="modal-box">
      <div id="modal-iframe-wrap" style="display:none"></div>
      <div id="modal-img-wrap"    style="display:none"></div>
      <div class="modal-info" id="modal-info"></div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
  // ── Shuffle (Fisher-Yates) ───────────────────────────────────
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Combina: pinned fixos na frente + resto embaralhado
  const ALL = [...PINNED, ...shuffle(RESOURCES)];

  // ── YouTube helpers ──────────────────────────────────────────
  function ytId(url) {
    const m = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }
  function ytThumb(url) {
    const id = ytId(url);
    return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : null;
  }

  // ── State ────────────────────────────────────────────────────
  let activeType = 'all';
  let activeTags = new Set();
  let searchQ    = '';

  // ── Collect all tags ─────────────────────────────────────────
  const allTags = [...new Set(ALL.flatMap(r => r.tags))].sort();

  // ── Build tag pills ──────────────────────────────────────────
  const tagPillsEl = document.getElementById('tag-pills');
  allTags.forEach(tag => {
    const el = document.createElement('div');
    el.className = 'tag';
    el.textContent = tag;
    el.dataset.tag = tag;
    el.addEventListener('click', () => {
      if (activeTags.has(tag)) activeTags.delete(tag);
      else activeTags.add(tag);
      el.classList.toggle('active', activeTags.has(tag));
      updateTagBadge();
      render();
    });
    tagPillsEl.appendChild(el);
  });

  // ── Type pills ───────────────────────────────────────────────
  document.querySelectorAll('#type-pills .pill').forEach(pill => {
    pill.addEventListener('click', () => {
      activeType = pill.dataset.type;
      document.querySelectorAll('#type-pills .pill').forEach(p =>
        p.classList.toggle('active', p.dataset.type === activeType));
      render();
    });
  });

  // ── Search ───────────────────────────────────────────────────
  document.getElementById('search').addEventListener('input', e => {
    searchQ = e.target.value.toLowerCase().trim();
    render();
  });

  // ── Filter ───────────────────────────────────────────────────
  function filtered() {
    return ALL.filter(r => {
      if (activeType !== 'all' && r.type !== activeType) return false;
      if (activeTags.size > 0 && !r.tags.some(t => activeTags.has(t))) return false;
      if (searchQ && !r.title.toLowerCase().includes(searchQ) &&
          !(r.description || '').toLowerCase().includes(searchQ) &&
          !r.tags.some(t => t.toLowerCase().includes(searchQ))) return false;
      return true;
    });
  }

  // ── Card builder ─────────────────────────────────────────────
  const TYPE_ICON = { video: '▶', link: '↗', image: '◉', download: '↓' };
  const TYPE_PLACEHOLDER = { video: '▶', link: '🔗', image: '🖼', download: '📁' };

  function thumb(r) {
    if (r.type === 'video') return ytThumb(r.url);
    return r.thumbnail || null;
  }

  function makeCard(r) {
    const t = thumb(r);
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-thumb">
        ${t
          ? `<img src="${t}" alt="${r.title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=thumb-placeholder>${TYPE_PLACEHOLDER[r.type]}</div>'">`
          : `<div class="thumb-placeholder">${TYPE_PLACEHOLDER[r.type]}</div>`
        }
        ${r.type === 'video' ? `<div class="play-badge"><svg width="48" height="48" viewBox="0 0 24 24" fill="rgba(255,255,255,.9)"><circle cx="12" cy="12" r="12" fill="rgba(0,0,0,.5)"/><polygon points="10,8 16,12 10,16" fill="white"/></svg></div>` : ''}
        <span class="type-badge ${r.type}">${TYPE_ICON[r.type]} ${r.type}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${r.title}</div>
        ${r.description ? `<div class="card-desc">${r.description}</div>` : ''}
        <div class="card-tags">${r.tags.map(t => `<span class="card-tag" data-tag="${t}">${t}</span>`).join('')}</div>
      </div>`;
    card.querySelectorAll('.card-tag').forEach(el => {
      el.addEventListener('click', e => { e.stopPropagation(); activateTag(el.dataset.tag); });
    });
    card.addEventListener('click', () => openModal(r));
    return card;
  }

  // ── Render ───────────────────────────────────────────────────
  function render() {
    const list = filtered();
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    grid.innerHTML = '';
    document.getElementById('count').textContent = list.length;
    if (list.length === 0) {
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      list.forEach(r => grid.appendChild(makeCard(r)));
    }
  }

  // ── Modal ────────────────────────────────────────────────────
  const modal        = document.getElementById('modal');
  const iframeWrap   = document.getElementById('modal-iframe-wrap');
  const imgWrap      = document.getElementById('modal-img-wrap');
  const modalInfo    = document.getElementById('modal-info');

  function openModal(r) {
    iframeWrap.style.display = 'none';
    imgWrap.style.display    = 'none';
    iframeWrap.innerHTML = '';
    imgWrap.innerHTML    = '';

    if (r.type === 'video') {
      const id = ytId(r.url);
      if (id) {
        iframeWrap.style.display = 'block';
        iframeWrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" allow="autoplay; fullscreen"></iframe>`;
      }
    } else if (r.type === 'image') {
      imgWrap.style.display = 'block';
      imgWrap.innerHTML = `<img src="${r.url}" alt="${r.title}">`;
    }

    const actionHTML =
      r.type === 'link'     ? `<a class="modal-action link"     href="${r.url}" target="_blank" rel="noopener">↗ Abrir link</a>` :
      r.type === 'download' ? `<a class="modal-action download" href="${r.url}" target="_blank" rel="noopener">↓ Acessar no Drive</a>` : '';

    modalInfo.innerHTML = `
      <div class="modal-title">${r.title}</div>
      ${r.description ? `<div class="modal-desc">${r.description}</div>` : ''}
      <div class="modal-tags">${r.tags.map(t => `<span class="modal-tag" data-tag="${t}">${t}</span>`).join('')}</div>
      ${actionHTML}`;

    modalInfo.querySelectorAll('.modal-tag').forEach(el => {
      el.addEventListener('click', () => { closeModal(); activateTag(el.dataset.tag); });
    });

    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modal.classList.remove('open');
    iframeWrap.innerHTML = '';
    document.body.style.overflow = '';
  }

  // ── Tag panel toggle ─────────────────────────────────────────
  const tagToggleBtn = document.getElementById('tag-toggle');
  const tagBadge     = document.getElementById('tag-badge');

  function setTagPanelOpen(open) {
    tagPillsEl.classList.toggle('open', open);
    tagToggleBtn.classList.toggle('open', open);
    tagToggleBtn.querySelector('svg').style.transform = open ? 'rotate(180deg)' : '';
  }

  function updateTagBadge() {
    const n = activeTags.size;
    tagBadge.textContent = n;
    tagBadge.classList.toggle('visible', n > 0);
  }

  tagToggleBtn.addEventListener('click', () => {
    setTagPanelOpen(!tagPillsEl.classList.contains('open'));
  });

  // ── Activate tag from card or modal ─────────────────────────
  function activateTag(tag) {
    if (!activeTags.has(tag)) activeTags.add(tag);
    else activeTags.delete(tag);
    const pill = tagPillsEl.querySelector(`[data-tag="${tag}"]`);
    if (pill) pill.classList.toggle('active', activeTags.has(tag));
    setTagPanelOpen(true); // abre o painel ao clicar numa tag
    updateTagBadge();
    render();
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── Init ─────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
